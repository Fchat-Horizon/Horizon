packages:
  - 'electron'
  - 'mobile'
  - 'scss'

allowBuilds:
  '@fortawesome/fontawesome-free': true
  '@parcel/watcher': true
  core-js: true
  electron: true
  electron-winstaller: false
  esbuild: true
  fs-xattr: true
  lzma-native: true
  macos-alias: true
  utf-8-validate: true

# Disable pnpm 11's new-release cooldown so fresh dependency bumps don't block installs/CI.
minimumReleaseAge: 0

overrides:
  vue-class-component: 6.3.2
  vue-loader: 15.11.1
  '@types/bluebird': 3.5.32
  '@types/har-format': 1.2.10
  '@types/node': '^24.0.0'
  pbkdf2: 3.1.3
  babel-core: 7.0.0-bridge.0
  babel-traverse: 7.25.9
  consolidate: 0.16.0
