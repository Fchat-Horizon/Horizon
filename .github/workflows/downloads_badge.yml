name: Update Downloads Badge

on:
  schedule:
    - cron: '43 3 * * *'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-badge:
    name: Recompute download count
    runs-on: ubuntu-latest
    steps:
      - name: Sum release downloads, excluding updater metadata
        uses: actions/github-script@v8
        with:
          script: |
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            // latest*.yml, *.blockmap, and *.zsync are fetched by the
            // auto-updater on every update check; SHASUMS files are not
            // downloads either. Counting them would inflate the badge.
            const isUpdaterMetadata = (name) =>
              /\.(yml|blockmap|zsync)$/i.test(name) || /^SHASUMS/i.test(name);

            let total = 0;
            for (const release of releases) {
              for (const asset of release.assets) {
                if (!isUpdaterMetadata(asset.name)) {
                  total += asset.download_count;
                }
              }
            }

            const message =
              total >= 1e6
                ? `${(total / 1e6).toFixed(1)}M`
                : total >= 1e3
                  ? `${Math.round(total / 1e3)}k`
                  : `${total}`;

            const fs = require('fs');
            fs.mkdirSync('badge', { recursive: true });
            fs.writeFileSync(
              'badge/downloads.json',
              JSON.stringify({
                schemaVersion: 1,
                label: 'downloads',
                message,
                color: 'brightgreen'
              })
            );
            core.notice(`Real downloads: ${total} (badge shows: ${message})`);

      - name: Publish to badges branch
        working-directory: badge
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git init --initial-branch=badges .
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add downloads.json
          git commit -m 'chore: update downloads badge data'
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:refs/heads/badges
