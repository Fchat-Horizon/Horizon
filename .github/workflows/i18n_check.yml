name: Locale Check

on:
  push:
    branches:
      - development
    paths:
      - 'chat/locales/*.json'
      - 'scripts/i18n-check.js'
  pull_request:
    paths:
      - 'chat/locales/*.json'
      - 'scripts/i18n-check.js'

permissions:
  contents: read

jobs:
  check:
    name: Validate locale files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Check locale files
        run: node scripts/i18n-check.js
