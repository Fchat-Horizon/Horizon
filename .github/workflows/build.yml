# ! Build & Create Draft Release workflow
name: Build & Create Draft Release

# * Set the required permissions for the workflow
permissions:
  contents: write

# * Trigger the workflow when a tag matching 'v[0-9]*' is pushed
on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  # function: Extract release version from the tag
  set-version:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.get_version.outputs.release_version }}
    steps:
      - name: Extract Release Version from Tag
        id: get_version
        run: |
          # * Get version number from the tag
          version="${GITHUB_REF#refs/tags/}"
          echo "release_version=${version}" >> $GITHUB_OUTPUT

  build:
    name: Build
    needs: set-version
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-26, windows-latest]
    env:
      RELEASE_VERSION: ${{ needs.set-version.outputs.release_version }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Run Build Script (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          # ! Execute Linux build script
          chmod +x apps/desktop/release-scripts/linux.sh
          apps/desktop/release-scripts/linux.sh "$RELEASE_VERSION" "$GITHUB_WORKSPACE/release_artifacts/linux/$RELEASE_VERSION"

      - name: Run Build Script (macOS)
        if: matrix.os == 'macos-26'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # ! Execute macOS build script
          chmod +x apps/desktop/release-scripts/macos.sh
          apps/desktop/release-scripts/macos.sh "$RELEASE_VERSION" "$GITHUB_WORKSPACE/release_artifacts/macos/$RELEASE_VERSION"

      - name: Run Build Script (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # ! Execute Windows build script
          .\src\electron\release-scripts\windows.ps1 -ReleaseVersion "$env:RELEASE_VERSION" -ReleasePath "$env:GITHUB_WORKSPACE\release_artifacts\windows\$env:RELEASE_VERSION"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.os }}-artifacts
          path: release_artifacts/**
          # note: Uploads artifacts for the current operating system

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Download Artifacts
        uses: actions/download-artifact@v7
        with:
          path: release_artifacts
          # * Downloads all artifacts from the build job

      - name: Generate SHA256 Checksums
        run: |
          mkdir -p final_release

          cp -r release_artifacts/*-artifacts/* final_release/

          cd final_release

          find . -type f -not -name "SHASUMS256.txt" -exec sha256sum {} \; | sort > SHASUMS256.txt

          cat SHASUMS256.txt

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          # Print the body of a "## [<header>]" section, up to the next "## [".
          # Matches the header literally so version dots aren't treated as regex.
          extract_section() {
            awk -v hdr="## [$1]" '
              index($0, hdr) == 1 { found = 1; next }
              /^## \[/ { if (found) exit }
              found
            ' CHANGELOG.md
          }

          has_text() { [ -n "$(printf '%s' "$1" | tr -d '[:space:]')" ]; }

          # Stable tags have a rolled "## [version]" section. Prereleases (e.g.
          # 1.2.0-dev.3) don't, so fall back to the Unreleased section rather than
          # an older, already-released version's notes.
          NOTES="$(extract_section "$VERSION")"
          if ! has_text "$NOTES"; then NOTES="$(extract_section "Unreleased")"; fi

          # Write to file to preserve formatting. This was changed from echo to printf
          # to be a little more... 'reliable.' 
          printf '%s\n' "$NOTES" > /tmp/release-notes.md

      - name: Detect release type
        id: release_type
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *"-dev."* ]]; then
            # Dev builds publish automatically — no human gate needed
            echo "draft=false" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == *"-beta."* ]]; then
            echo "draft=true" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "draft=true" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: ${{ steps.release_type.outputs.draft }}
          prerelease: ${{ steps.release_type.outputs.prerelease }}
          body_path: /tmp/release-notes.md
          files: final_release/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
